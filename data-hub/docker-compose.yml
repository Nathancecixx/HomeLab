services:
  postgres:
    image: postgres:16-alpine
    container_name: data-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - data-hub-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: data-hub-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - data-hub-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    container_name: data-hub-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8084
      MEDIA_ROOT: /data-hub-media
    ports:
      - "${DATA_HUB_API_PORT:-8084}:8084"
    volumes:
      - ${DATA_HUB_MEDIA_ROOT}:/data-hub-media
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8084/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    container_name: data-hub-worker
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      MEDIA_ROOT: /data-hub-media
    volumes:
      - ${DATA_HUB_MEDIA_ROOT}:/data-hub-media

  web:
    container_name: data-hub-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${DATA_HUB_API_ORIGIN}
      DATA_HUB_INTERNAL_API_URL: ${DATA_HUB_INTERNAL_API_URL}
    ports:
      - "${DATA_HUB_WEB_PORT:-8083}:3000"

volumes:
  data-hub-postgres:
  data-hub-redis:
